    <rect x="408" width="238" height="42" rx="21"/>
  </g>
  <g transform="translate(156 508)" fill="#1f6feb" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="800">
    <text>AI 오더</text>
    <text x="204">화물맨 연동</text>
    <text x="408">정산/세금계산서 관리</text>
  </g>
</svg>
